name: eagle_eye_admin
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  get: 4.6.6
  gap: ^3.0.1
  lottie: ^3.1.2
  go_router: ^7.0.0
  flutter_svg: ^2.0.10+1
  dio: ^5.4.3+1
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^6.0.3
  get_storage: ^2.1.1
  toastification: ^2.3.0
  firebase_core: ^3.8.1
  google_sign_in: ^6.2.2
  firebase_auth: ^5.3.4
  table_calendar: ^3.1.3
  dropdown_button2: ^2.3.9
  file_picker: ^8.1.6
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  html: ^0.15.5
  intl: ^0.19.0
  get_thumbnail_video: ^0.7.3
  image_picker: ^1.1.2
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  image_picker_web: ^4.0.0
  firebase_messaging: ^15.2.3
  cross_file: ^0.3.4+2
  country_code_picker: ^3.1.0
  country_picker: ^2.0.27
  http_parser:
  libphonenumber: ^2.0.0
  logic_go_network:
    git:
      url: https://bitbucket.org/LogicGoNIkunj/logic_go_network.git
      ref: main

dev_dependencies:
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.4.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter_gen:
  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: font/Poppins-Light.ttf
          weight: 500
        - asset: font/Poppins-Regular.ttf
          weight: 600
        - asset: font/Poppins-Medium.ttf
          weight: 700
        - asset: font/Poppins-SemiBold.ttf
          weight: 800
        - asset: font/Poppins-Bold.ttf
          weight: 900
    - family: Arvo
      fonts:
        - asset: font/Arvo-Bold.ttf
          weight: 700

  assets:
    - assets/animation/
    - font/
    - assets/image/
    - assets/icons/

flutter_intl:
  enabled: true
